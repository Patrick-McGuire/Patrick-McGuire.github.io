<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SillyGoose Configuration Tool</title>
    <script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        :root {
            --bg-color: #0f172a; --card-bg: #1e293b; --text-main: #f8fafc;
            --accent: #38bdf8; --success: #22c55e; --danger: #ef4444;
            --border: #334155; --sidebar-w: 350px;
        }
        body {
            font-family: 'Inter', sans-serif; background-color: var(--bg-color);
            color: var(--text-main); margin: 0; display: flex; height: 100vh; overflow: hidden;
        }
        #sidebar {
            width: var(--sidebar-w); background-color: var(--card-bg);
            border-right: 1px solid var(--border); display: flex; flex-direction: column;
            padding: 20px; gap: 15px; box-sizing: border-box;
        }
        #main-content { flex-grow: 1; display: flex; flex-direction: column; padding: 20px; gap: 10px; overflow-y: auto; }
        
        header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); padding-bottom: 10px; }
        .header-right { display: flex; align-items: center; gap: 15px; }

        .loader {
            width: 20px; height: 20px; border: 3px solid var(--border);
            border-bottom-color: var(--accent); border-radius: 50%;
            display: none; animation: rotation 1s linear infinite;
        }
        @keyframes rotation { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .tabs { display: flex; gap: 10px; }
        .tab-btn { 
            padding: 10px 20px; border: none; background: none; color: #94a3b8; 
            cursor: pointer; font-weight: 600; border-bottom: 2px solid transparent;
        }
        .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }
        .tab-content { display: none; flex-direction: column; gap: 10px; flex-grow: 1; }
        .tab-content.active { display: flex; }

        .config-row { display: flex; gap: 10px; margin-bottom: 10px; }
        .config-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .config-item { background: #111827; padding: 10px; border-radius: 6px; border: 1px solid var(--border); }
        .config-label { font-size: 0.7rem; color: #94a3b8; margin-bottom: 5px; text-transform: uppercase; }
        .config-input-group { display: flex; gap: 5px; }
        .config-input-group input { 
            background: #0f172a; border: 1px solid var(--border); color: white; 
            padding: 5px; border-radius: 4px; flex-grow: 1; width: 50px; font-size: 0.85rem;
        }

        .btn {
            background-color: var(--accent); color: var(--bg-color); border: none;
            padding: 10px; border-radius: 6px; font-weight: 600; cursor: pointer; width: 100%;
            height: 40px; display: flex; align-items: center; justify-content: center;
            box-sizing: border-box; text-align: center;
        }
        .btn:disabled { opacity: 0.3; cursor: not-allowed; }
        .btn-secondary { background-color: var(--border); color: white; }
        .btn-danger { background-color: var(--danger); color: white; }
        .btn-warn { background-color: #f59e0b; color: black; }

        .sidebar-actions { display: flex; flex-direction: column; gap: 8px; margin-top: auto; }

        #series-modal {
            display: none; position: fixed; z-index: 100; left: 0; top: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); align-items: center; justify-content: center;
        }
        .modal-box {
            background: var(--card-bg); padding: 20px; border-radius: 12px; width: 420px;
            border: 1px solid var(--border); max-height: 80vh; overflow-y: auto;
        }
        .series-list { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 20px 0; }
        .series-opt { font-size: 0.85rem; display: flex; align-items: center; gap: 10px; cursor: pointer; color: #cbd5e1; }

        #flight-list { flex-grow: 1; overflow-y: auto; border: 1px solid var(--border); border-radius: 6px; background: #0f172a; min-height: 150px; }
        .flight-item { padding: 5px 10px; border-bottom: 1px solid var(--border); cursor: pointer; display: flex; justify-content: space-between; align-items: center; font-size: 0.8rem; height: 40px; box-sizing: border-box; }
        .flight-item.active { background: #1e293b; border-left: 4px solid var(--accent); }
        .del-btn { 
            background: #334155; color: #ef4444; border: none; border-radius: 4px; 
            width: 28px; height: 28px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 1.1rem;
        }
        .del-btn:hover { background: #ef4444; color: white; }

        #plot-container { background-color: var(--card-bg); border-radius: 12px; flex-grow: 1; border: 1px solid var(--border); }
        #terminal { background: #000; color: #00ff41; font-family: 'Courier New', monospace; padding: 12px; font-size: 0.75rem; overflow-y: auto; border-radius: 8px; height: 140px; border: 1px solid var(--border); line-height: 1.4; }
        
        .stats-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; }
        .stat-card { background: var(--card-bg); padding: 10px; border-radius: 8px; border: 1px solid var(--border); text-align: center; display: flex; flex-direction: column; justify-content: center; }
        .stat-val { font-size: 1.2rem; font-weight: bold; color: var(--accent); }

        #hover-dashboard {
            background: #111827; border: 1px solid var(--border); border-radius: 8px;
            padding: 10px; display: flex; flex-wrap: wrap; gap: 15px; min-height: 40px;
            align-items: center; font-size: 0.85rem;
        }
        .hover-item { display: flex; gap: 5px; color: #94a3b8; }
        .hover-val { color: var(--accent); font-weight: bold; }
    </style>
</head>
<body>

<div id="series-modal">
    <div class="modal-box">
        <h3 style="margin-top:0">Graph Series Selection</h3>
        <div class="series-list" id="series-picker"></div>
        <button class="btn" onclick="closeSeriesModal()">Apply & Close</button>
    </div>
</div>

<div id="sidebar">
    <h2 style="margin:0">🪿 SillyGoose</h2>
    
    <button id="connectBtn" class="btn">Connect Device</button>
    <button id="disconnectBtn" class="btn btn-danger" style="display:none">Disconnect Port</button>
    
    <div style="font-size: 0.75rem; color: #94a3b8; margin-top:10px;">SESSION FLIGHTS</div>
    <div id="flight-list"></div>
    
    <div class="sidebar-actions">
        <button id="downloadZipBtn" class="btn btn-secondary" disabled>Download All (ZIP)</button>
        <button id="clearAllBtn" class="btn btn-danger">Clear Session</button>
        <input type="file" id="file-upload" style="display:none">
        <label for="file-upload" class="btn btn-secondary">Load Local File</label>
        <button id="saveFileBtn" class="btn btn-secondary" disabled>Download Selected</button>
    </div>
</div>

<div id="main-content">
    <header>
        <div class="tabs">
            <button class="tab-btn active" onclick="openTab('flight-tab')">Flight Data</button>
            <button class="tab-btn" onclick="openTab('config-tab')">System Control</button>
        </div>
        <div class="header-right">
            <div id="busy-loader" class="loader"></div>
        </div>
    </header>

    <div id="flight-tab" class="tab-content active">
        <div class="stats-grid">
            <div class="stat-card"><div id="stat-alt" class="stat-val">0</div><div style="font-size:0.6rem">MAX ALT (m)</div></div>
            <div class="stat-card"><div id="stat-vel" class="stat-val">0</div><div style="font-size:0.6rem">MAX VEL (m/s)</div></div>
            <div class="stat-card"><div id="stat-state" class="stat-val">-</div><div style="font-size:0.6rem">FINAL STATE</div></div>
            <div class="stat-card"><button id="offloadBtn" class="btn btn-secondary" disabled style="height:100%; font-size:0.75rem">Offload Data</button></div>
            <div class="stat-card"><button class="btn btn-secondary" style="height:100%; font-size: 0.75rem;" onclick="openSeriesModal()">Select Series</button></div>
        </div>

        <div id="hover-dashboard">
            <div style="color: #64748b; font-style: italic;">Hover over the chart to see data...</div>
        </div>

        <div id="plot-container"></div>
    </div>

    <div id="config-tab" class="tab-content">
        <div style="display:flex; justify-content: space-between; align-items: center;">
            <div style="font-size: 0.75rem; color: #94a3b8;">SYSTEM COMMANDS</div>
            <button id="getAllBtn" class="btn btn-secondary" style="width:120px; font-size:0.7rem; height:30px" disabled>Get All Configs</button>
        </div>
        <div class="config-row">
            <button class="btn btn-warn ctrl-btn" data-cmd="--reset" disabled>Reset Board</button>
            <button class="btn btn-danger" id="eraseBtn" disabled onclick="confirmErase()">Erase Flash</button>
            <button class="btn btn-warn ctrl-btn" data-cmd="--fire -d" disabled>Fire Drogue</button>
            <button class="btn btn-warn ctrl-btn" data-cmd="--fire -m" disabled>Fire Main</button>
        </div>
        <div class="config-grid" id="config-fields"></div>
    </div>

    <div id="terminal"></div>
    <div style="display:flex; gap:10px">
        <input type="text" id="cmd-input" placeholder="Manually enter command..." style="flex-grow:1; background:#111827; border:1px solid var(--border); color:white; padding:10px; border-radius:6px">
        <button id="sendBtn" class="btn" style="width:100px" disabled>Send</button>
    </div>
</div>

<script>
    let port, reader, inputDone, keepReading = true;
    let flightData = []; 
    let selectedIdx = -1;
    let termBuffer = "";
    
    let recording = false;
    let currentFlightLines = [];

    const HEADER = [
        "timestampMs", "pressurePa", "tempK", "accelX", "accelY", "accelZ",
        "gyroX", "gyroY", "gyroZ", "imuTemp", "battV", "altitudeM", 
        "velocityMS", "accelerationMSS", "unfiltAlt", "flightState",
        "drogueCont", "drogueFired", "mainCont", "mainFired"
    ];

    const stateNames = {0:"PRE_FLIGHT", 1:"ASCENT", 2:"DESCENT", 3:"POST_FLIGHT"};
    let activeSeries = [11, 12, 13]; 

    const configs = [
        { id: "DROGUE_DELAY", label: "Drogue Delay" },
        { id: "MAIN_ELEVATION", label: "Main Elev" },
        { id: "BATTERY_VOLTAGE_SENSOR_SCALE_FACTOR", label: "Batt Scale" },
        { id: "GROUND_ELEVATION", label: "Ground Elev" },
        { id: "GROUND_TEMPERATURE", label: "Ground Temp" },
        { id: "PYRO_FIRE_DURATION", label: "Pyro Duration" },
        { id: "BOARD_NAME", label: "Board Name" },
        { id: "CONFIGURATION_VERSION", label: "Config Ver" }
    ];

    function setBusy(val) {
        document.getElementById('busy-loader').style.display = val ? 'block' : 'none';
        if (!val && port) setSerialEnabled(true);
    }

    async function connect() {
        try {
            port = await navigator.serial.requestPort();
            await port.open({ baudRate: 115200 });
            document.getElementById('connectBtn').style.display = 'none';
            document.getElementById('disconnectBtn').style.display = 'block';
            setSerialEnabled(true);
            keepReading = true;
            readLoop();
        } catch (e) { logTerm("Connection Error: " + e.message, "red"); }
    }

    async function disconnect() {
        keepReading = false;
        if (reader) {
            await reader.cancel();
            await inputDone.catch(() => {});
            reader = null;
        }
        if (port) {
            await port.close();
            port = null;
        }
        forceUIDisconnect();
    }

    function forceUIDisconnect() {
        port = null; setBusy(false); recording = false;
        document.getElementById('connectBtn').style.display = 'block';
        document.getElementById('disconnectBtn').style.display = 'none';
        setSerialEnabled(false);
    }

    async function readLoop() {
        while (port && port.readable && keepReading) {
            const textDecoder = new TextDecoderStream();
            inputDone = port.readable.pipeTo(textDecoder.writable);
            reader = textDecoder.readable.getReader();
            let rawBuffer = "";

            try {
                while (keepReading) {
                    const { value, done } = await reader.read();
                    if (done) break;
                    rawBuffer += value;
                    let lines = rawBuffer.split("\n");
                    rawBuffer = lines.pop();

                    for (let line of lines) {
                        line = line.trim();
                        if (!line) continue;
                        logTerm(line);

                        const setMatch = line.match(/MSG:\s+([A-Z_]+)\s+is set to:\s+(.+)/);
                        if (setMatch) {
                            const inputEl = document.getElementById(`in-${setMatch[1]}`);
                            if (inputEl) inputEl.value = setMatch[2].trim();
                            setBusy(false);
                        }

                        if (line.includes("Starting Offload")) {
                            recording = true; currentFlightLines = []; setBusy(true);
                            continue;
                        }

                        if (recording) {
                            if (line.includes("Logger setup")) {
                                if (currentFlightLines.length > 5) saveFlight(currentFlightLines);
                                currentFlightLines = [];
                                continue;
                            }
                            if (line.includes("Ending Offload")) {
                                if (currentFlightLines.length > 5) saveFlight(currentFlightLines);
                                recording = false; currentFlightLines = []; setBusy(false);
                                continue;
                            }
                            if (/^\d/.test(line)) currentFlightLines.push(line);
                        }
                        if (line.includes("Erase Complete")) setBusy(false);
                    }
                }
            } catch (e) { 
                break; 
            } finally { 
                if (reader) {
                    reader.releaseLock();
                    reader = null;
                }
            }
        }
    }

    async function sendCmd(msg) {
        if (!port || !port.writable) return;
        setBusy(true);
        const writer = port.writable.getWriter();
        await writer.write(new TextEncoder().encode(msg + "\n"));
        writer.releaseLock();
        logTerm(`>> ${msg}`, "#38bdf8");
        if(!msg.includes("offload") && !msg.includes("erase")) setTimeout(() => setBusy(false), 800);
    }

    function saveFlight(lines) {
        const flightNum = flightData.length + 1;
        const flight = { id: Date.now(), name: `Flight_${flightNum}`, raw: [...lines] };
        flightData.push(flight);
        refreshList();
        selectFlight(flightData.length - 1);
    }

    function refreshList() {
        const list = document.getElementById('flight-list');
        list.innerHTML = '';
        flightData.forEach((f, i) => {
            const item = document.createElement('div');
            item.className = `flight-item ${i === selectedIdx ? 'active' : ''}`;
            item.innerHTML = `<span>${f.name}</span><button class="del-btn" onclick="event.stopPropagation(); deleteLog(${i})">×</button>`;
            item.onclick = () => selectFlight(i);
            list.appendChild(item);
        });
        document.getElementById('clearAllBtn').disabled = (flightData.length === 0);
        document.getElementById('downloadZipBtn').disabled = (flightData.length === 0);
    }

    function selectFlight(i) {
        selectedIdx = i; refreshList();
        plotFlight(flightData[i]);
        document.getElementById('saveFileBtn').disabled = false;
    }

    function plotFlight(flight) {
        const rows = flight.raw.map(l => l.split(/[\s\t]+/));
        const t0 = parseFloat(rows[0][0]);
        const t = rows.map(r => (parseFloat(r[0]) - t0) / 1000);

        const traces = activeSeries.map(idx => {
            const vals = rows.map(r => parseFloat(r[idx]));
            return {
                x: t, y: vals, name: HEADER[idx], mode: 'lines',
                hovertemplate: '<b>%{y:.2f}</b><extra></extra>'
            };
        });

        const states = rows.map(r => parseInt(r[15]));
        const shapes = [], annotations = [];
        const addEv = (time, txt, col) => {
            shapes.push({ type:'line', x0:time, x1:time, y0:0, y1:1, yref:'paper', line:{color:col, width:1, dash:'dash'} });
            annotations.push({ x:time, y:1, yref:'paper', text:txt, showarrow:false, textangle:-90, xanchor:'right', font:{color:col, size:9} });
        };

        for (let i = 1; i < states.length; i++) {
            if (states[i] !== states[i-1]) addEv(t[i], `${stateNames[states[i-1]]} → ${stateNames[states[i]]}`, 'green');
            if (rows[i][17] == "1" && rows[i-1][17] == "0") addEv(t[i], "DROGUE FIRED", "purple");
            if (rows[i][19] == "1" && rows[i-1][19] == "0") addEv(t[i], "MAIN FIRED", "blue");
        }

        Plotly.newPlot('plot-container', traces, {
            paper_bgcolor:'rgba(0,0,0,0)', plot_bgcolor:'rgba(0,0,0,0)',
            font:{color:'#f8fafc'}, margin:{t:60, r:20, l:50, b:40},
            hovermode:'x unified', xaxis:{title:'Time (s)', gridcolor:'#334155'},
            yaxis:{title:'Data', gridcolor:'#334155'}, shapes, annotations,
            showlegend: true,
            legend: {
                orientation: 'h',
                yanchor: 'bottom',
                y: 1.02,
                xanchor: 'right',
                x: 1,
                font: { size: 10, color: '#94a3b8' }
            }
        }, {responsive: true, displaylogo: false});

        const gd = document.getElementById('plot-container');
        gd.on('plotly_hover', data => {
            let html = `<div class="hover-item">Time: <span class="hover-val">${data.points[0].x.toFixed(3)}s</span></div>`;
            data.points.forEach(pt => {
                html += `<div class="hover-item">${pt.data.name}: <span class="hover-val">${pt.y.toFixed(2)}</span></div>`;
            });
            document.getElementById('hover-dashboard').innerHTML = html;
        });
        gd.on('plotly_unhover', () => {
            document.getElementById('hover-dashboard').innerHTML = `<div style="color: #64748b; font-style: italic;">Hover over the chart to see data...</div>`;
        });

        document.getElementById('stat-alt').innerText = Math.max(...rows.map(r => parseFloat(r[11]))).toFixed(1);
        document.getElementById('stat-vel').innerText = Math.max(...rows.map(r => parseFloat(r[12]))).toFixed(1);
        document.getElementById('stat-state').innerText = stateNames[states[states.length-1]] || '-';
    }

    function logTerm(msg, color = "#00ff41") {
        termBuffer += `<div style="color:${color}">[${new Date().toLocaleTimeString()}] ${msg}</div>`;
    }

    setInterval(() => {
        if (termBuffer) {
            const t = document.getElementById('terminal');
            t.insertAdjacentHTML('beforeend', termBuffer);
            termBuffer = ""; t.scrollTop = t.scrollHeight;
            while (t.childNodes.length > 80) t.removeChild(t.firstChild);
        }
    }, 100);

    function setSerialEnabled(en) {
        document.querySelectorAll('.ctrl-btn, .cfg-get, .cfg-set, #sendBtn, #offloadBtn, #getAllBtn, #eraseBtn').forEach(b => b.disabled = !en);
    }

    function initUI() {
        const picker = document.getElementById('series-picker');
        HEADER.forEach((h, i) => {
            if(i === 0) return;
            picker.innerHTML += `<label class="series-opt"><input type="checkbox" data-idx="${i}" ${activeSeries.includes(i) ? 'checked' : ''}> ${h}</label>`;
        });
        const cfgContainer = document.getElementById('config-fields');
        configs.forEach(cfg => {
            cfgContainer.innerHTML += `
                <div class="config-item">
                    <div class="config-label">${cfg.label}</div>
                    <div class="config-input-group">
                        <input type="text" id="in-${cfg.id}" placeholder="...">
                        <button class="btn btn-secondary cfg-get" data-id="${cfg.id}" style="width:50px; padding:2px; height:24px; font-size:0.7rem">Get</button>
                        <button class="btn cfg-set" data-id="${cfg.id}" style="width:50px; padding:2px; height:24px; font-size:0.7rem">Set</button>
                    </div>
                </div>`;
        });
    }

    function deleteLog(i) {
        flightData.splice(i, 1);
        if(selectedIdx === i) { selectedIdx = -1; Plotly.purge('plot-container'); document.getElementById('saveFileBtn').disabled = true; }
        refreshList();
    }

    function clearAllSession() {
        if(confirm("Clear current session flights?")) {
            flightData = []; selectedIdx = -1;
            Plotly.purge('plot-container');
            document.getElementById('saveFileBtn').disabled = true;
            refreshList();
        }
    }

    function openTab(id) {
        document.querySelectorAll('.tab-content, .tab-btn').forEach(el => el.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        if (event) event.currentTarget.classList.add('active');
    }

    function openSeriesModal() { document.getElementById('series-modal').style.display = 'flex'; }
    function closeSeriesModal() { 
        activeSeries = Array.from(document.querySelectorAll('#series-picker input:checked')).map(i => parseInt(i.dataset.idx));
        document.getElementById('series-modal').style.display = 'none';
        if(selectedIdx !== -1) plotFlight(flightData[selectedIdx]);
    }

    async function confirmErase() {
        if(confirm("⚠️ Erase flash?")) await sendCmd("--erase");
    }

    document.getElementById('saveFileBtn').onclick = () => {
        const f = flightData[selectedIdx];
        const blob = new Blob([HEADER.join("\t") + "\n" + f.raw.join("\n")], {type: 'text/plain'});
        const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
        a.download = f.name + ".txt"; a.click();
    };

    document.getElementById('downloadZipBtn').onclick = async () => {
        const zip = new JSZip();
        flightData.forEach(f => {
            const content = HEADER.join("\t") + "\n" + f.raw.join("\n");
            zip.file(`${f.name}.txt`, content);
        });
        const content = await zip.generateAsync({type:"blob"});
        const a = document.createElement('a'); a.href = URL.createObjectURL(content);
        a.download = "SillyGoose_All_Flights.zip"; a.click();
    };

    document.getElementById('connectBtn').onclick = connect;
    document.getElementById('disconnectBtn').onclick = disconnect;
    document.getElementById('offloadBtn').onclick = () => sendCmd("--offload");
    document.getElementById('clearAllBtn').onclick = clearAllSession;
    document.getElementById('getAllBtn').onclick = () => configs.forEach((c, i) => setTimeout(() => sendCmd(`--${c.id}`), i * 150));
    document.getElementById('sendBtn').onclick = () => { const i = document.getElementById('cmd-input'); sendCmd(i.value); i.value=''; };
    document.getElementById('cmd-input').onkeydown = e => { if(e.key === 'Enter') document.getElementById('sendBtn').click(); };

    document.addEventListener('click', e => {
        const btn = e.target;
        if (btn.classList.contains('ctrl-btn')) sendCmd(btn.dataset.cmd);
        if (btn.classList.contains('cfg-get')) sendCmd(`--${btn.dataset.id}`);
        if (btn.classList.contains('cfg-set')) {
            const val = document.getElementById(`in-${btn.dataset.id}`).value;
            sendCmd(`--${btn.dataset.id} -set ${val}`);
        }
    });

    document.getElementById('file-upload').onchange = e => {
        const fr = new FileReader();
        fr.onload = ev => saveFlight(ev.target.result.split(/\r?\n/).filter(l => /^\s*\d/.test(l)));
        fr.readAsText(e.target.files[0]);
    };

    navigator.serial.addEventListener('disconnect', forceUIDisconnect);
    initUI();
    refreshList();
</script>
</body>
</html>
