<div id="topbar" role="toolbar" aria-label="Map tools">
  <button id="panel-toggle" class="btn" type="button" title="Toggle tools panel" aria-label="Toggle tools panel">Menu</button>
  <div class="brand">Map</div>
  <select id="basemap-select" class="control" title="Base map" aria-label="Base map">
    <option value="satellite">Satellite</option>
    <option value="street">Street</option>
  </select>
  <button id="locate-btn" class="btn" type="button" title="Center on browser location">Locate</button>

  <span class="divider"></span>

  <button id="draw-point-btn" class="btn tool-btn" type="button" title="Drop standalone points">
    <span class="tool-icon point-icon"></span><span>Point</span>
  </button>
  <button id="draw-segment-btn" class="btn tool-btn" type="button" title="Draw a two-point segment">
    <span class="tool-icon segment-icon"></span><span>Segment</span>
  </button>
  <button id="draw-path-btn" class="btn tool-btn" type="button" title="Draw a multi-point path">
    <span class="tool-icon path-icon"></span><span>Path</span>
  </button>
  <label class="compact-field" title="Distance units">
    <span>Units</span>
    <select id="distance-units">
      <option value="meters" selected>m</option>
      <option value="kilometers">km</option>
      <option value="feet">ft</option>
      <option value="miles">mi</option>
      <option value="nauticalMiles">nmi</option>
    </select>
  </label>
  <label class="compact-field check-compact" title="Show permanent distance labels">
    <input id="show-distance-labels" type="checkbox">
    <span>Labels</span>
  </label>
  <label class="compact-field check-compact" title="Allow dragging features on the map to edit them">
    <input id="allow-dragging" type="checkbox" checked>
    <span>Drag</span>
  </label>

  <span id="draw-status" class="status-chip">Ready</span>
</div>

<div id="tool-options" class="tool-options" hidden>
  <div class="tool-options-title" id="tool-options-title">New Point</div>
  <div class="tool-option-row tool-name-row">
    <label class="full">
      <span>Name</span>
      <input id="tool-feature-name" type="text" placeholder="Point 1">
    </label>
  </div>
  <div class="tool-option-row tool-point-only">
    <label>
      <span>Type</span>
      <select id="tool-point-type">
        <option value="circle">Circle</option>
        <option value="pin">Pin</option>
        <option value="square">Square</option>
        <option value="triangle">Triangle</option>
        <option value="diamond">Diamond</option>
        <option value="cross">Cross</option>
      </select>
    </label>
    <label>
      <span>Size</span>
      <input id="tool-point-size" type="number" min="4" max="48" value="14">
    </label>
    <label>
      <span>Color</span>
      <input id="tool-point-color" type="color" value="#ff6b35">
    </label>
  </div>
  <div class="tool-option-row tool-line-only">
    <label>
      <span>Color</span>
      <input id="path-color" type="color" value="#1c7ed6">
    </label>
    <label>
      <span>Width</span>
      <input id="path-width" type="number" min="1" max="12" value="4">
    </label>
  </div>
  <div class="tool-option-row two tool-point-coords">
    <label>
      <span>Latitude</span>
      <input id="tool-point-lat" type="number" step="0.000001" placeholder="click map">
    </label>
    <label>
      <span>Longitude</span>
      <input id="tool-point-lon" type="number" step="0.000001" placeholder="click map">
    </label>
  </div>
  <div class="tool-segment-coords">
    <div class="tool-coord-group">
      <div class="tool-coord-label">Point 1</div>
      <div class="tool-option-row two">
        <label>
          <span>Latitude</span>
          <input id="tool-seg-lat1" type="number" step="0.000001" placeholder="click map">
        </label>
        <label>
          <span>Longitude</span>
          <input id="tool-seg-lon1" type="number" step="0.000001" placeholder="click map">
        </label>
      </div>
    </div>
    <div class="tool-coord-group">
      <div class="tool-coord-label">Point 2</div>
      <div class="tool-option-row two">
        <label>
          <span>Latitude</span>
          <input id="tool-seg-lat2" type="number" step="0.000001" placeholder="click map">
        </label>
        <label>
          <span>Longitude</span>
          <input id="tool-seg-lon2" type="number" step="0.000001" placeholder="click map">
        </label>
      </div>
    </div>
  </div>
  <div class="tool-actions">
    <button id="tool-undo-btn" class="icon-btn" type="button" title="Undo last point (Ctrl+Z)" disabled>&#8630;</button>
    <span class="tool-actions-spacer"></span>
    <button id="tool-cancel-btn" class="icon-btn cancel" type="button" title="Cancel (Esc)">&#10005;</button>
    <button id="tool-finish-btn" class="icon-btn confirm" type="button" title="Finish (Enter)">&#10003;</button>
  </div>
</div>

<div id="feature-menu" class="feature-menu" hidden>
  <div class="feature-menu-title" id="feature-menu-title">Feature</div>
  <div id="feature-menu-fields" class="feature-menu-fields"></div>
  <div class="feature-menu-actions">
    <button id="feature-menu-tree-btn" class="tree-btn" type="button">Tree</button>
    <button id="feature-menu-delete-btn" class="tree-btn danger" type="button">Delete</button>
  </div>
</div>

<aside id="side-panel" class="side-panel" aria-label="Bulk plotting panel">
  <div class="panel-head">
    <h1>Map Tools</h1>
    <button id="panel-close" class="btn ghost" type="button" title="Close panel">Close</button>
  </div>

  <div class="panel-tabs" role="tablist" aria-label="Side panel views">
    <button id="plot-tab-btn" class="panel-tab active" type="button" role="tab" aria-selected="true" aria-controls="plot-panel">Plot</button>
    <button id="elements-tab-btn" class="panel-tab" type="button" role="tab" aria-selected="false" aria-controls="elements-panel">Elements</button>
    <button id="files-tab-btn" class="panel-tab" type="button" role="tab" aria-selected="false" aria-controls="files-panel">Files</button>
  </div>

  <div id="plot-panel" class="panel-scroll panel-tab-panel active" role="tabpanel" aria-labelledby="plot-tab-btn">
    <section class="panel-section">
      <label class="field-label" for="point-input">Points</label>
      <textarea id="point-input" spellcheck="false" placeholder="42.3601,-71.0589,circle,14&#10;42.3584,-71.0636,pin,18&#10;42.3550,-71.0550,square,12"></textarea>

      <div class="form-grid">
        <label>
          <span>Plot as</span>
          <select id="plot-mode">
            <option value="points">Points</option>
            <option value="path">Connected path</option>
          </select>
        </label>
        <label>
          <span>Default type</span>
          <select id="default-type">
            <option value="circle">Circle</option>
            <option value="pin">Pin</option>
            <option value="square">Square</option>
            <option value="triangle">Triangle</option>
            <option value="diamond">Diamond</option>
            <option value="cross">Cross</option>
          </select>
        </label>
        <label>
          <span>Default size</span>
          <input id="default-size" type="number" min="4" max="48" value="14">
        </label>
        <label>
          <span>Marker color</span>
          <input id="default-color" type="color" value="#ff6b35">
        </label>
        <label class="check-row">
          <input id="replace-existing" type="checkbox" checked>
          <span>Replace</span>
        </label>
      </div>

      <div class="button-row">
        <button id="plot-btn" class="btn primary" type="button">Plot</button>
        <button id="fit-btn" class="btn" type="button">Fit</button>
        <button id="clear-points-btn" class="btn danger" type="button">Clear Points</button>
      </div>
    </section>

    <section class="panel-section">
      <div class="summary-grid">
        <div>
          <span class="metric" id="point-count">0</span>
          <span class="metric-label">points</span>
        </div>
        <div>
          <span class="metric" id="path-count">0</span>
          <span class="metric-label">paths</span>
        </div>
      </div>

      <div class="button-row">
        <button id="sample-btn" class="btn" type="button">Sample</button>
        <button id="export-points-btn" class="btn" type="button" disabled>Export Points</button>
      </div>

      <div id="error-box" class="error-box" hidden>
        <div class="error-title">Skipped lines</div>
        <ul id="error-list"></ul>
      </div>
    </section>
  </div>

  <div id="elements-panel" class="panel-scroll panel-tab-panel" role="tabpanel" aria-labelledby="elements-tab-btn">
    <section class="panel-section">
      <div class="button-row compact-actions">
        <button id="fit-elements-btn" class="btn" type="button">Fit All</button>
        <button id="clear-elements-btn" class="btn danger" type="button">Clear All</button>
      </div>
      <div id="element-tree" class="element-tree"></div>
    </section>
  </div>

  <div id="files-panel" class="panel-scroll panel-tab-panel" role="tabpanel" aria-labelledby="files-tab-btn">
    <section class="panel-section">
      <div class="button-row compact-actions">
        <button id="new-file-btn" class="btn primary" type="button">New</button>
        <button id="download-file-btn" class="btn" type="button">Download</button>
        <button id="open-computer-btn" class="btn" type="button">Open File</button>
        <input id="open-file-input" type="file" accept="application/json,.json" hidden>
      </div>
      <div id="file-list" class="file-list"></div>
    </section>
  </div>
</aside>

<main id="map" aria-label="Satellite map"></main>
<div id="toast" class="toast" role="status" aria-live="polite"></div>
<noscript>
  <div class="noscript">JavaScript is required for this map.</div>
</noscript>
